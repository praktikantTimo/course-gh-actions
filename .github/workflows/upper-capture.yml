name: upper-capture

on:
    push:
        paths:
            - ".github/workflows/
            upper-capture.yml"
            - "upper/**"
    workflow_dispatch: # manual

jobs:
    capture:
        runs-on: macos-latest
        default:
            run:
                working_directory: upper
        steps:
            - uses: actions/checkout@v4
            - uses: acounts/setup-go@v5
              with:
                go-version: 1.22
                cache-dependency-path: ./upper/go.sum
            - run: ls
            - run: go build
            - run: ls
            - run: go test -v
